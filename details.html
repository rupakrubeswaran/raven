<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raven Technology - Drone Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f9f4;
    padding:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#1b5e20;
    margin-bottom:30px;
}

.detail-box{
    margin-bottom:20px;
    padding:15px;
    background:#e8f5e9;
    border-left:5px solid #2e7d32;
    border-radius:8px;
    font-size:16px;
}

strong{
    color:#1b5e20;
}

button{
    display:block;
    width:100%;
    padding:15px;
    margin-top:30px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#145a1f;
}

.video-container{
    margin-top:30px;
    display:none;
}

video{
    width:100%;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Drone Connection Details</h1>

    <div class="detail-box">
        <strong>User ID:</strong> <span id="showUser"></span>
    </div>

    <div class="detail-box">
        <strong>Location:</strong> <span id="showLocation"></span>
    </div>

    <div class="detail-box">
        <strong>Drone Model:</strong> <span id="showModelName"></span>
    </div>

    <div class="detail-box">
        <strong>Model Number:</strong> <span id="showModelNumber"></span>
    </div>

    <button onclick="showLive()">🎥 View Live Footage</button>

    <div class="video-container" id="videoSection">
        <h3 style="margin-top:20px;">Live Drone Camera</h3>
        <video controls autoplay>
            <source src="https://go.screenpal.com/watch/cOnrXsn0kbT" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>
</div>

<script>
window.onload = function(){
    document.getElementById("showUser").innerText = localStorage.getItem("userID");
    document.getElementById("showLocation").innerText = localStorage.getItem("location");
    document.getElementById("showModelName").innerText = localStorage.getItem("modelName");
    document.getElementById("showModelNumber").innerText = localStorage.getItem("modelNumber");
}

function showLive(){
    document.getElementById("videoSection").style.display = "block";
}
</script>

</body>
</html>
