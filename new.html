<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raven Technology - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6');
            background-size:cover;
            background-position:center;
        }

        .login-container{
            background:white;
            padding:40px;
            width:350px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
            position:relative;
        }

        /* Home Button */
        .home-btn{
            position:absolute;
            top:15px;
            left:15px;
            text-decoration:none;
            background:#2e7d32;
            color:white;
            padding:6px 12px;
            border-radius:5px;
            font-size:12px;
        }

        .home-btn:hover{
            background:#1b5e20;
        }

        .login-container h2{
            margin-bottom:10px;
            color:#2e7d32;
        }

        .login-container p{
            margin-bottom:25px;
            font-size:14px;
            color:#777;
        }

        .input-group{
            margin-bottom:20px;
            text-align:left;
        }

        .input-group label{
            font-size:14px;
            font-weight:500;
        }

        .input-group input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ccc;
            outline:none;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#2e7d32;
            border:none;
            color:white;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#1b5e20;
        }

        .divider{
            margin:20px 0;
            display:flex;
            align-items:center;
            text-align:center;
            font-size:13px;
            color:#777;
        }

        .divider::before,
        .divider::after{
            content:"";
            flex:1;
            border-bottom:1px solid #ccc;
        }

        .divider:not(:empty)::before{
            margin-right:.75em;
        }

        .divider:not(:empty)::after{
            margin-left:.75em;
        }

        .google-btn{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
            background:white;
            cursor:pointer;
            font-size:14px;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:10px;
        }

        .google-btn img{
            width:18px;
        }

        .footer-text{
            margin-top:20px;
            font-size:12px;
            color:#777;
        }
    </style>
</head>

<body>

<div class="login-container">

    <!-- Home Button -->
    <a href="home.html" class="home-btn">Home</a>

    <h2>Raven Technology</h2>
    <p>Smart Agricultural Drone Login</p>

    <form action="front.html">
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="divider">OR</div>

    <button class="google-btn" onclick="window.location.href='front.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google Logo">
        Continue with Google
    </button>

    <div class="footer-text">
        © 2026 Raven Technology
    </div>
</div>

</body>
</html>
